# NTIRE RobustAIGenDetection manifest: binary real/fake, no per-generator domain.
#   shard_N/{images,labels.csv} -> scripts/preprocess_ntire.py -> manifest CSV
source: manifest             # "faceforensics" (folder) or "manifest" (CSV)
root: null                   # unused in manifest mode
manifest: data/ntire_manifest.csv   # output of scripts/preprocess_ntire.py
image_size: ${backbone.image_size}
batch_size: 48
num_workers: 16              # DGX has cores to spare; JPEG full-res decode is CPU-bound
jpeg_draft_size: 448         # 2x the 224 input; PIL only reduces by 1/2,1/4,1/8, never below this
real_oversample: 2           # pooled ratio is ~36% real / 64% fake (vs. FF++'s need for 4x)
balance_sampler: false       # alt.: WeightedRandomSampler instead of duplication (needs real_oversample=1)
use_face_crop: false         # enable + pick a backend if NTIRE images aren't pre-cropped faces
face_backend: opencv         # opencv | retinaface | dlib
face_margin: 1.3
resize_mode: squash          # "squash" (default) | "crop" (Fase 2 item 2.2 experiment; see PLAN_v0.1.md R5)
domain_map: null             # unused in manifest mode (domain comes from the CSV)
# Advanced, forgery-aware augmentation. ENABLED here (unlike FF++'s
# paper-faithful default) because the NTIRE challenge explicitly evaluates
# robustness to "in the wild" post-processing (crop/resize/JPEG/blur). Only
# affects the training split; val/test always use plain resize + normalise.
augmentation:
  enabled: true
  hflip: 0.5
  color_jitter: 0.2          # leve; distorção fotométrica do "in the wild"
  hue: 0.05
  random_resized_crop: true  # robustez a crop/reframe
  rrc_scale: [0.5, 1.0]      # crops mais agressivos que o default (challenge usa crop)
  gaussian_blur: 0.3
  blur_sigma: [0.1, 2.0]
  jpeg: 0.5                  # recompressão é a distorção mais comum na prática
  jpeg_quality: [30, 95]
  downscale: 0.3
  downscale_range: [0.25, 0.9]
  random_erasing: 0.0        # cutout pode apagar o artefato-alvo; manter off
pin_memory: true
persistent_workers: true
prefetch_factor: 4           # deeper per-worker queue to smooth full-res JPEG decode spikes
