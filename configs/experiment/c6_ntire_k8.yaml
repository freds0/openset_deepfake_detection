# @package _global_
# C6 — pseudo-domínios k-means (k=8) para o FSM no NTIRE.
# Pré-requisito: gerar o manifest com
#   python scripts/assign_pseudo_domains.py --k 8 --out data/ntire_manifest_k8.csv
defaults:
  - override /data: ntire
data:
  manifest: data/ntire_manifest_k8.csv
fsm:
  single_domain_fallback: "off"   # exige domínios reais; monitorar train/fsm_fired
logger:
  wandb:
    name: c6_ntire_k8
    tags: [v0.2, C, c6_ntire_k8]
