# Classifier / feature-fusion settings.
feature_fusion: global        # "global" (MAP pooled) or "global_local"
head_hidden_dim: 256          # penultimate (SCL) feature width
head_dropout: 0.0
train_norm: false             # also train LayerNorm affine params (optional)
train_pool_head: false        # also train the backbone's MAP pooling head (optional, Fase 2)
