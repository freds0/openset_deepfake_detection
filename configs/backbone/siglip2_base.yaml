# SigLIP 2 base, patch16, 224px (default; 768-dim, 196 patch tokens).
# Fixed-resolution SigLIP 2 checkpoints are backward compatible with the
# SigLIP v1 architecture and take standard (B,3,224,224) pixel_values.
model_name: google/siglip2-base-patch16-224
image_size: 224
freeze: true          # frozen backbone (paper default)
pretrained: true      # false + load_for_inference() reconstructs from ckpt state_dict, no HF download
attn_implementation: null   # null = HF default (sdpa) | eager | sdpa | flash_attention_2 (needs flash-attn)
